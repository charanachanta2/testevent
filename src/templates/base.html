<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildHub Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f9ff', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full text-slate-300 antialiased font-sans flex flex-col">
    <div class="min-h-full flex flex-col">
        <nav class="border-b border-slate-900 bg-slate-900/50 backdrop-blur-md sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center gap-8">
                        <span class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                            <div class="h-3 w-3 bg-brand-500 rounded-full animate-pulse"></div> BuildHub
                        </span>
                        <div class="flex space-x-1">
                            <a href="/hub/events" class="bg-slate-950 text-white px-3 py-2 rounded-md text-sm font-medium border border-slate-800">Events Space</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
        <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% block structural_scripts %}{% endblock %}
</body>
</html>
